    </ul>

    <div style="text-align: center;">
      <a href="news/"
        style="display: inline-block; font-size: 14px; font-weight: 700; color: #7c5cbf; border: 2px solid #7c5cbf; padding: 10px 32px; border-radius: 24px; transition: all 0.2s;">ニュース一覧を見る

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    (async function () {
      try {
        var articles = await fetchArticles();

        // --- 注目ニュース（最新1件） ---
        var featuredEl = document.getElementById('featured-section');
        if (articles && articles.length > 0) {
          var feat = articles[0];
          featuredEl.innerHTML = ''
            + '<span class="featured-label">🔥 注目ニュース</span>'
            + '<h2 class="featured-title">' + escapeHtml(feat.title) + '</h2>'
            + '<p class="featured-summary">' + escapeHtml(feat.summary || '') + '</p>'
            + '<a href="news/article.html?slug=' + encodeURIComponent(feat.slug) + '" class="featured-link">続きを読む →</a>';
        }

        // --- 話題ニュース（2番目～7番目の6件） ---
        var topicEl = document.getElementById('topic-grid');
        var topicArticles = articles.slice(1, 7);
        if (topicArticles.length > 0) {
          topicEl.innerHTML = topicArticles.map(function (a) {
            var cat = CATEGORY_MAP[a.category];
            var dateStr = '';
            try { dateStr = a.published_at ? formatDate(a.published_at) : ''; } catch (e) { dateStr = ''; }
            return '<a href="news/article.html?slug=' + encodeURIComponent(a.slug) + '" class="topic-card">'
              + '<div>'
              + (cat ? '<span class="topic-tag ' + cat.tagClass + '">' + cat.label + '</span>' : '')
              + '<h3 class="topic-title">' + escapeHtml(a.title) + '</h3>'
              + '<p class="topic-desc">' + escapeHtml(a.summary || '') + '</p>'
              + '</div>'
              + '<time class="topic-date">' + dateStr + '</time>'
              + '</a>';
          }).join('');
        }

        // --- 最新ニュース（全記事から最新10件） ---
        var latestEl = document.getElementById('latest-list');
        var latestArticles = articles.slice(0, 10);
        if (latestArticles.length > 0) {
          latestEl.innerHTML = latestArticles.map(function (a) {
            var cat = CATEGORY_MAP[a.category];
            var shortDate = '';
            try {
              var d = new Date(a.published_at);
              shortDate = String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
            } catch (e) { shortDate = ''; }
            return '<li class="latest-item">'
              + '<a href="news/article.html?slug=' + encodeURIComponent(a.slug) + '" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;width:100%;">'
              + '<span class="latest-date">' + shortDate + '</span>'
              + (cat ? '<span class="latest-tag ' + cat.tagClass + '">' + cat.label + '</span>' : '')
              + '<span class="latest-title">' + escapeHtml(a.title) + '</span>'
              + '</a></li>';
          }).join('');
        }

      } catch (err) {
        console.error('トップページ描画エラー:', err);
        document.getElementById('featured-section').innerHTML = '<p style="text-align:center;padding:24px 0;color:#c62828;">データの取得に失敗しました。</p>';
        document.getElementById('topic-grid').innerHTML = '';
        document.getElementById('latest-list').innerHTML = '';
      }
    })();
  </script>
