  <script>
    (async function () {
      // Supabase またはサンプルデータから記事一覧取得
      const dbArticles = await fetchArticles();

      const allArticles = dbArticles.map(a => ({
        slug: a.slug,
        title: a.title,
        summary: a.summary || '',
        category: a.category,
        date: a.published_at ? a.published_at.split('T')[0] : '',
      }));

      // 日付降順ソート
      allArticles.sort((a, b) => b.date.localeCompare(a.date));

      // カテゴリフィルタ
      const params = new URLSearchParams(window.location.search);
      const catFilter = params.get('cat');
      const filteredArticles = catFilter
        ? allArticles.filter(a => a.category === catFilter)
        : allArticles;

      // カテゴリ名をページタイトル・メタ情報に反映
      if (catFilter && CATEGORY_MAP[catFilter]) {
        var catLabel = CATEGORY_MAP[catFilter].label;
        document.querySelector('.section-heading').textContent = catLabel + ' ニュース一覧';
        document.title = catLabel + ' ニュース一覧 - ジジねた';
        var catDesc = catLabel + '関連の最新ニュース一覧 - ジジねた';
        var metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute('content', catDesc);
        var ogTitle = document.querySelector('meta[property="og:title"]');
        if (ogTitle) ogTitle.setAttribute('content', catLabel + ' ニュース一覧 - ジジねた');
        var ogDesc = document.querySelector('meta[property="og:description"]');
        if (ogDesc) ogDesc.setAttribute('content', catDesc);
        var twTitle = document.querySelector('meta[name="twitter:title"]');
        if (twTitle) twTitle.setAttribute('content', catLabel + ' ニュース一覧 - ジジねた');
        var twDesc = document.querySelector('meta[name="twitter:description"]');
        if (twDesc) twDesc.setAttribute('content', catDesc);
      }

      // canonical: クエリパラメータを除いたベースURL
      var canonicalEl = document.querySelector('link[rel="canonical"]');
      if (canonicalEl) canonicalEl.setAttribute('href', 'https://tmmmmt.github.io/zizineta/news/index.html');

      // 検索クエリ対応
      var searchQuery = params.get('q');
      if (searchQuery) {
        document.title = '「' + searchQuery + '」の検索結果 - ジジねた';
      }

      const PER_PAGE = 10;
      const totalPages = Math.ceil(filteredArticles.length / PER_PAGE);
      let currentPage = parseInt(params.get('page')) || 1;
      currentPage = Math.max(1, Math.min(currentPage, totalPages));

      const listEl = document.getElementById('newsList');
      const paginationEl = document.getElementById('pagination');

      function renderPage(page) {
        const start = (page - 1) * PER_PAGE;
        const items = filteredArticles.slice(start, start + PER_PAGE);

        listEl.innerHTML = items.map(item => {
          const cat = CATEGORY_MAP[item.category];
          const dateStr = item.date ? formatDate(item.date) : '';
          return `
            <a href="article.html?slug=${encodeURIComponent(item.slug)}" class="news-list-item">
              <div class="news-list-meta">
                <span class="news-list-date">${dateStr}</span>
                ${cat ? `<span class="news-list-category ${cat.tagClass}">${cat.label}</span>` : ''}
              </div>
              <h2 class="news-list-title">${escapeHtml(item.title)}</h2>
              ${item.summary ? `<p class="news-list-summary">${escapeHtml(item.summary)}</p>` : ''}
            </a>`;
        }).join('');

        const catParam = catFilter ? '&cat=' + encodeURIComponent(catFilter) : '';
        let pagHTML = '';
        if (page > 1) pagHTML += `<a href="?page=${page - 1}${catParam}">&laquo;</a>`;
        for (let i = 1; i <= totalPages; i++) {
          pagHTML += i === page
            ? `<span class="active">${i}</span>`
            : `<a href="?page=${i}${catParam}">${i}</a>`;
        }
        if (page < totalPages) pagHTML += `<a href="?page=${page + 1}${catParam}">&raquo;</a>`;
        paginationEl.innerHTML = pagHTML;
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      renderPage(currentPage);
    })();
  </script>
